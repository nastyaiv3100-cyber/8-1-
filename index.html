<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Комплексный урок • 3 четверть • 1 класс</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --tile-bg: #f0c6d8;
      --tile-bg-alt: #c8a0c0;
      --primary-text: #3d1a2e;
      --accent: #e07aa0;
      --accent-soft: #ffe0ec;
      --error: #e05070;
      --success: #7bc98a;
      --shadow-soft: 0 18px 40px rgba(180, 80, 120, 0.25);
      --font-main: "Roboto Condensed", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font-main);
      background: #fce4ef;
      color: var(--primary-text);
    }
    body { display: flex; align-items: stretch; justify-content: center; }
    .app-root {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-text);
    }
    .start-screen {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url("https://i.postimg.cc/zfDJJXH4/Phoenix_10_Magical_spring_flower_garden_background_wide_horizo_0.jpg") center/cover no-repeat fixed;
      padding: 24px;
    }
    .start-overlay {
      position: relative;
      backdrop-filter: blur(8px);
      background: radial-gradient(circle at top left, rgba(255,230,240,0.92), rgba(255,210,230,0.92));
      border-radius: 28px;
      padding: 36px 28px;
      box-shadow: 0 18px 50px rgba(200, 80, 130, 0.3), 0 0 0 1px rgba(255,255,255,0.5);
      max-width: 460px;
      width: 100%;
    }
    .start-title {
      font-size: 32px;
      line-height: 1.2;
      font-weight: 700;
      color: #2c2107;
      margin-bottom: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .start-subtitle {
      font-size: 20px;
      color: #2c2107;
      line-height: 1.5;
      opacity: 0.88;
      margin-bottom: 24px;
    }
    .start-highlight {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
      color: #2c2107;
      font-size: 16px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 16px;
      background: rgba(0,0,0,0.3);
    }
    .start-button {
      margin-top: 8px;
      width: 100%;
      max-width: 260px;
      font-size: 20px;
      padding: 12px 20px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      box-shadow: 0 12px 30px rgba(200,60,120,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.55);
      filter: brightness(1.04);
    }
    .start-button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .start-footer { margin-top: 20px; font-size: 16px; opacity: 0.8; color: #2c2107;}
    .game-screen {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      background: url("https://i.postimg.cc/CKvwdTjx/20260222_1049_Image_Generation_simple_compose_01kj254n7eftmtd1cp2yt7mvaz.png") center/cover fixed no-repeat;
      padding: 16px;
    }
    .game-wrapper {
      position: relative;
      width: 100%;
      max-width: 1120px;
      min-height: min(90vh, 720px);
      background: linear-gradient(145deg, rgba(255,220,235,0.92), rgba(255,240,248,0.94));
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px 8px;
    }
    .progress {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,240,248,0.9);
      border: 1px solid rgba(220,100,150,0.3);
    }
    .progress-check {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      color: var(--accent);
    }
    .progress-text {
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .sound-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,220,235,0.85);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      box-shadow: 0 8px 18px rgba(200,60,120,0.2);
    }
    .sound-toggle:hover {
      background: rgba(255,200,220,0.95);
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(200,60,120,0.3);
    }
    .sound-toggle:active {
      transform: translateY(1px) scale(0.96);
      box-shadow: 0 6px 14px rgba(200,60,120,0.2);
    }
    .sound-icon { font-size: 24px; }
    .game-field {
      position: relative;
      flex: 1;
      padding: 10px 18px 18px;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .image-area {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      flex: 1;
      display: flex;
    }
    .puzzle-image-wrapper {
      position: relative;
      flex: 1;
      background: url("https://i.postimg.cc/438XnkzY/20260222_1051_Image_Generation_simple_compose_01kj25a1gremrak7acpf4eed1e.png") center/cover no-repeat;
    }
    .tiles-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 0;
    }
    @media (max-width: 768px) {
      .game-field { padding: 8px 10px 14px; }
      .progress-text { font-size: 18px; }
    }
    .puzzle-tile {
      position: relative;
      display: flex;
      align-items: stretch;
      justify-content: center;
      cursor: pointer;
      perspective: 1000px;
      background: var(--tile-bg);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.2s ease;
      overflow: visible;
    }
    .puzzle-tile:nth-child(odd) { background: var(--tile-bg-alt); }
    .puzzle-tile-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 20px;
      line-height: 1.25;
      color: var(--primary-text);
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 0%, rgba(255,255,255,0.3), transparent 55%),
        radial-gradient(circle at 80% 100%, rgba(220,80,130,0.2), transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,0.15), rgba(240,120,160,0.2));
      box-shadow: 0 12px 28px rgba(180, 60, 100, 0.2);
    }
    .puzzle-tile[data-index="0"]  .puzzle-tile-inner { border-radius: 24px 0 0 0; }
    .puzzle-tile[data-index="3"]  .puzzle-tile-inner { border-radius: 0 24px 0 0; }
    .puzzle-tile[data-index="8"]  .puzzle-tile-inner { border-radius: 0 0 0 24px; }
    .puzzle-tile[data-index="11"] .puzzle-tile-inner { border-radius: 0 0 24px 0; }
    .tile-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .tile-header {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.8;
    }
    .tile-zoom-btn {
      border: none;
      border-radius: 999px;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(200,60,120,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
      flex-shrink: 0;
    }
    .tile-zoom-btn:hover { transform: scale(1.15); box-shadow: 0 5px 14px rgba(200,60,120,0.5); }
    .tile-zoom-btn:active { transform: scale(0.92); }
    .tile-question {
      font-size: 22px;
      margin-bottom: 6px;
    }
    .tile-input {
      width: 100%;
      font-size: 20px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,240,248,0.7);
      color: #3d1a2e;
      outline: none;
      margin-bottom: 6px;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .tile-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(255,204,77,0.7);
      background: rgba(0,0,0,0.5);
    }
    .tile-button {
      align-self: flex-end;
      flex-shrink: 0;
      font-size: 15px;
      padding: 4px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      box-shadow: 0 4px 12px rgba(200,60,120,0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.15s ease;
      margin-top: 3px;
    }
    .tile-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(200,60,120,0.5);
      filter: brightness(1.05);
    }
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 6px 16px rgba(0,0,0,0.55);
    }
    .tile-button:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 6px 16px rgba(0,0,0,0.55);
    }
    /* === MULTI-EXAMPLE tile === */
    .examples-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      flex: 1;
      margin-bottom: 4px;
    }
    .example-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      line-height: 1.2;
    }
    .example-label {
      flex-shrink: 0;
      font-weight: 600;
      color: #3d1a2e;
      white-space: nowrap;
    }
    .example-input {
      width: 44px;
      font-size: 13px;
      padding: 3px 6px;
      border-radius: 999px;
      border: 1px solid rgba(200,80,130,0.35);
      background: rgba(255,240,248,0.8);
      color: #3d1a2e;
      outline: none;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .example-input:focus {
      border-color: #e07aa0;
      box-shadow: 0 0 0 1px rgba(224,122,160,0.5);
    }
    .example-input.correct {
      background: rgba(123,201,138,0.3);
      border-color: #7bc98a;
    }
    /* === SIGN-CHOICE tile === */
    .comparisons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px 6px;
      flex: 1;
      margin-bottom: 4px;
    }
    .comparison-row {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      flex-wrap: nowrap;
    }
    .comparison-expr {
      flex-shrink: 0;
      font-weight: 600;
      white-space: nowrap;
      font-size: 11px;
    }
    .sign-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(200,80,130,0.4);
      background: rgba(255,240,248,0.8);
      color: #3d1a2e;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .sign-btn:hover { background: rgba(240,138,170,0.35); transform: scale(1.1); }
    .sign-btn.selected { background: linear-gradient(135deg,#f08aaa,#e060a0); color:#fff; border-color:#e060a0; }
    .sign-btn.correct  { background: linear-gradient(135deg,#7bc98a,#5ab070); color:#fff; border-color:#5ab070; }
    @media (max-width: 640px) {
      .tile-header { font-size: 18px; }
      .tile-question { font-size: 20px; }
      .tile-input, .tile-button { font-size: 18px; }
      .example-row { font-size: 11px; }
      .example-input { font-size: 11px; width: 38px; }
      .comparison-expr { font-size: 10px; }
      .sign-btn { width: 22px; height: 22px; font-size: 12px; }
    }
    .puzzle-tile-inner::before,
    .puzzle-tile-inner::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }
    .puzzle-tile[data-index="0"] .puzzle-tile-inner::before,
    .puzzle-tile[data-index="3"] .puzzle-tile-inner::before,
    .puzzle-tile[data-index="8"] .puzzle-tile-inner::after,
    .puzzle-tile[data-index="11"] .puzzle-tile-inner::after {}
    .puzzle-tile[data-top="tab"] .puzzle-tile-inner::before,
    .puzzle-tile[data-top="blank"] .puzzle-tile-inner::before {
      width: 32px;
      height: 32px;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
    }
    .puzzle-tile[data-top="tab"] .puzzle-tile-inner::before {
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 70%),
        linear-gradient(135deg, #d47090, #f0b0c8);
      box-shadow: 0 4px 8px rgba(0,0,0,0.7);
    }
    .puzzle-tile[data-top="blank"] .puzzle-tile-inner::before {
      background: #f8d0e0;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
    }
    .puzzle-tile[data-bottom="tab"] .puzzle-tile-inner::after,
    .puzzle-tile[data-bottom="blank"] .puzzle-tile-inner::after {
      width: 32px;
      height: 32px;
      bottom: -16px;
      left: 50%;
      transform: translateX(-50%);
    }
    .puzzle-tile[data-bottom="tab"] .puzzle-tile-inner::after {
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 70%),
        linear-gradient(135deg, #d47090, #f0b0c8);
      box-shadow: 0 -4px 8px rgba(0,0,0,0.7);
    }
    .puzzle-tile[data-bottom="blank"] .puzzle-tile-inner::after {
      background: #f8d0e0;
      box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
    }
    .puzzle-tile[data-top="none"] .puzzle-tile-inner::before,
    .puzzle-tile[data-bottom="none"] .puzzle-tile-inner::after {
      display: none;
    }
    .puzzle-tile::before,
    .puzzle-tile::after {
      content: "";
      position: absolute;
      border-radius: 50%;
    }
    .puzzle-tile[data-left="tab"]::before,
    .puzzle-tile[data-left="blank"]::before {
      width: 32px;
      height: 32px;
      left: -16px;
      top: 50%;
      transform: translateY(-50%);
    }
    .puzzle-tile[data-left="tab"]::before {
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 70%),
        linear-gradient(135deg, #d47090, #f0b0c8);
      box-shadow: 4px 0 8px rgba(0,0,0,0.75);
    }
    .puzzle-tile[data-left="blank"]::before {
      background: #f8d0e0;
      box-shadow: inset 4px 0 6px rgba(0,0,0,0.7);
    }
    .puzzle-tile[data-right="tab"]::after,
    .puzzle-tile[data-right="blank"]::after {
      width: 32px;
      height: 32px;
      right: -16px;
      top: 50%;
      transform: translateY(-50%);
    }
    .puzzle-tile[data-right="tab"]::after {
      background:
        radial-gradient(circle at 70% 30%, rgba(255,255,255,0.25), transparent 70%),
        linear-gradient(45deg, #d47090, #f0b0c8);
      box-shadow: -4px 0 8px rgba(0,0,0,0.75);
    }
    .puzzle-tile[data-right="blank"]::after {
      background: #f8d0e0;
      box-shadow: inset -4px 0 6px rgba(0,0,0,0.7);
    }
    .puzzle-tile[data-left="none"]::before,
    .puzzle-tile[data-right="none"]::after {
      display: none;
    }
    .puzzle-tile:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 32px rgba(0,0,0,0.95);
    }
    .puzzle-tile.disabled {
      cursor: default;
      pointer-events: none;
      opacity: 0;
      transform: translateY(0) scale(0.96);
      box-shadow: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .puzzle-tile.flipping {
      animation: tileFlip 0.42s ease forwards;
    }
    @keyframes tileFlip {
      0%   { transform: rotateY(0deg); }
      40%  { transform: rotateY(90deg); }
      100% { transform: rotateY(90deg); opacity: 0; }
    }
    .puzzle-tile.wiggle {
      animation: tileWiggle 0.3s ease;
    }
    @keyframes tileWiggle {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-4px); }
      40%  { transform: translateX(4px); }
      60%  { transform: translateX(-2px); }
      80%  { transform: translateX(2px); }
      100% { transform: translateX(0); }
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 80;
      padding: 16px;
    }
    .overlay.visible { display: flex; }
    .overlay-card {
      background: radial-gradient(circle at top left, #fff0f5, #ffe0ee);
      border-radius: 18px;
      padding: 22px 18px 18px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.7);
    }
    .overlay-title {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--error);
      text-transform: uppercase;
    }
    .overlay-text {
      font-size: 20px;
      opacity: 0.9;
      margin-bottom: 18px;
    }
    .overlay-button {
      font-size: 20px;
      padding: 8px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.5);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .overlay-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(0,0,0,0.6);
    }
    .overlay-button:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 6px 16px rgba(0,0,0,0.45);
    }
    .final-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      background: radial-gradient(circle at top, rgba(255,200,220,0.3), rgba(220,80,130,0.7));
      z-index: 100;
      overflow: hidden;
    }
    .final-overlay.visible { display: flex; }
    .final-content {
      position: relative;
      z-index: 2;
      max-width: 460px;
      width: 100%;
      padding: 24px 22px 18px;
      border-radius: 22px;
      text-align: center;
      background: radial-gradient(circle at top left, rgba(255,240,248,0.98), rgba(255,220,235,0.98));
      box-shadow: 0 20px 60px rgba(200, 60, 120, 0.4);
      color: #5a1030;
    }
    .final-title {
      font-size: 34px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 10px;
    }
    .final-subtitle {
      font-size: 20px;
      margin-bottom: 18px;
      opacity: 0.95;
    }
    .final-button {
      font-size: 20px;
      padding: 10px 26px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      box-shadow: 0 12px 30px rgba(200,60,120,0.4);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .final-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.85);
    }
    .final-button:active {
      transform: translateY(1px) scale(0.97);
      box-shadow: 0 8px 22px rgba(0,0,0,0.7);
    }
    .firework {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    @keyframes explode {
      0% { transform: scale(0.1); opacity: 1; }
      70% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.2); opacity: 0; }
    }
    .zoom-overlay {
      position: fixed;
      inset: 0;
      background: rgba(100,20,60,0.55);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      padding: 16px;
    }
    .zoom-overlay.visible { display: flex; }
    .zoom-card {
      position: relative;
      max-width: 560px;
      width: 100%;
      background: radial-gradient(circle at top left, #fff5f8, #ffe8f0);
      border-radius: 28px;
      padding: 24px 24px 20px;
      box-shadow: 0 24px 60px rgba(200,60,120,0.45);
      color: #3d1a2e;
      max-height: 92vh;
      overflow-y: auto;
    }
    .zoom-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .zoom-title {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.75;
    }
    .zoom-close {
      border: none;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,#f08aaa,#e060a0);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(200,60,120,0.4);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .zoom-close:hover { transform: scale(1.1); }
    .zoom-close:active { transform: scale(0.95); }
    .zoom-question {
      font-size: 18px;
      font-weight: 600;
      line-height: 1.45;
      white-space: pre-wrap;
      margin-bottom: 18px;
      color: #3d1a2e;
    }
    /* zoom text input */
    .zoom-input {
      width: 100%;
      font-size: 22px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid rgba(220,100,150,0.35);
      background: rgba(255,255,255,0.9);
      color: #3d1a2e;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .zoom-input:focus {
      border-color: #e07aa0;
      box-shadow: 0 0 0 3px rgba(224,122,160,0.2);
    }
    .zoom-button {
      font-size: 18px;
      padding: 10px 28px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #f08aaa, #e060a0);
      color: #fff;
      box-shadow: 0 8px 20px rgba(200,60,120,0.4);
      transition: transform 0.1s, box-shadow 0.1s, filter 0.15s;
    }
    .zoom-button:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .zoom-button:active { transform: translateY(1px) scale(0.97); }
    /* zoom examples grid */
    .zoom-examples-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin-bottom: 16px;
    }
    .zoom-example-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
    }
    .zoom-example-input {
      width: 60px;
      font-size: 18px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 2px solid rgba(220,100,150,0.35);
      background: rgba(255,255,255,0.9);
      color: #3d1a2e;
      outline: none;
      text-align: center;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .zoom-example-input:focus {
      border-color: #e07aa0;
      box-shadow: 0 0 0 3px rgba(224,122,160,0.2);
    }
    .zoom-example-input.correct {
      background: rgba(123,201,138,0.25);
      border-color: #7bc98a;
    }
    /* zoom signs grid */
    .zoom-comparisons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-bottom: 16px;
    }
    .zoom-comparison-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 16px;
      font-weight: 600;
      flex-wrap: nowrap;
    }
    .zoom-sign-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid rgba(200,80,130,0.4);
      background: rgba(255,240,248,0.9);
      color: #3d1a2e;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
    }
    .zoom-sign-btn:hover { background: rgba(240,138,170,0.35); transform: scale(1.12); }
    .zoom-sign-btn.selected { background: linear-gradient(135deg,#f08aaa,#e060a0); color:#fff; border-color:#e060a0; }
    .zoom-sign-btn.correct  { background: linear-gradient(135deg,#7bc98a,#5ab070); color:#fff; border-color:#5ab070; }

    /* ===== BUTTERFLIES (SVG, natural flight) ===== */
    .butterfly-wrap {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      will-change: transform;
    }
    .butterfly-wrap svg {
      display: block;
      overflow: visible;
    }
    /* Left wing folds toward body centre x=50 */
    .bf-wing-l {
      transform-box: fill-box;
      transform-origin: right center;
      animation: flapL var(--flap) ease-in-out infinite alternate;
    }
    /* Right wing folds toward body centre x=50 */
    .bf-wing-r {
      transform-box: fill-box;
      transform-origin: left center;
      animation: flapR var(--flap) ease-in-out infinite alternate;
    }
    @keyframes flapL {
      0%   { transform: scaleX(1);    }
      100% { transform: scaleX(0.08); }
    }
    @keyframes flapR {
      0%   { transform: scaleX(1);    }
      100% { transform: scaleX(0.08); }
    }
    /* falling petals trail */
    .bf-petal {
      position: absolute;
      width: 7px;
      height: 10px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: petalFall var(--pd) ease-in infinite;
      animation-delay: var(--pdelay);
    }
    @keyframes petalFall {
      0%   { opacity: .85; transform: translate(0,0) rotate(0deg) scale(1); }
      100% { opacity: 0;   transform: translate(var(--px), var(--py)) rotate(200deg) scale(0.2); }
    }

    /* ===== BOUNCE CARD ON START ===== */
    @keyframes bounceIn {
      0%   { transform: scale(0.3) translateY(-120px); opacity: 0; }
      50%  { transform: scale(1.08) translateY(12px); opacity: 1; }
      70%  { transform: scale(0.96) translateY(-6px); }
      85%  { transform: scale(1.03) translateY(3px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .start-overlay {
      animation: bounceIn 0.85s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    /* ===== NO IDLE SWAY — tiles are still ===== */
    .puzzle-tile:hover:not(.disabled) {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 14px 32px rgba(200,60,120,0.3);
    }

    /* ===== FLOWER BLOOM ON CORRECT ===== */
    .flower-bloom {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 0px;
      animation: flowerBloom 1.1s ease-out forwards;
    }
    @keyframes flowerBloom {
      0%   { font-size: 0px; opacity: 1; transform: scale(0) rotate(-30deg); }
      40%  { font-size: 52px; transform: scale(1.2) rotate(10deg); opacity: 1; }
      70%  { font-size: 44px; transform: scale(1) rotate(-5deg); opacity: 1; }
      100% { font-size: 48px; transform: scale(0.8) rotate(0deg) translateY(-60px); opacity: 0; }
    }

    /* ===== SPARKS FROM SEND BUTTON ===== */
    .spark {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: sparkFly 0.7s ease-out forwards;
    }
    @keyframes sparkFly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--sx), var(--sy)) scale(0); opacity: 0; }
    }

    /* ===== RAINBOW ON WIN ===== */
    .rainbow-arc {
      position: absolute;
      width: 200%;
      height: 200%;
      left: -50%;
      bottom: -60%;
      border-radius: 50%;
      border: 0px solid transparent;
      pointer-events: none;
      animation: rainbowAppear 1.6s ease-out forwards;
      z-index: 0;
    }
    @keyframes rainbowAppear {
      0%   { border-width: 0px; opacity: 0; transform: scale(0.5); }
      40%  { opacity: 0.9; }
      100% { border-width: 60px; opacity: 0.7; transform: scale(1); }
    }
    .rainbow-arc:nth-child(1) { border-color: rgba(255,80,80,0.7);   animation-delay: 0s; }
    .rainbow-arc:nth-child(2) { border-color: rgba(255,160,30,0.7);  animation-delay: 0.08s; width: 190%; height: 190%; left: -45%; bottom: -58%; }
    .rainbow-arc:nth-child(3) { border-color: rgba(255,230,0,0.7);   animation-delay: 0.16s; width: 180%; height: 180%; left: -40%; bottom: -56%; }
    .rainbow-arc:nth-child(4) { border-color: rgba(80,200,80,0.7);   animation-delay: 0.24s; width: 170%; height: 170%; left: -35%; bottom: -54%; }
    .rainbow-arc:nth-child(5) { border-color: rgba(80,150,255,0.7);  animation-delay: 0.32s; width: 160%; height: 160%; left: -30%; bottom: -52%; }
    .rainbow-arc:nth-child(6) { border-color: rgba(180,80,255,0.7);  animation-delay: 0.40s; width: 150%; height: 150%; left: -25%; bottom: -50%; }

    /* ===== HEART FIREWORKS ===== */
    .heart-fw {
      position: absolute;
      pointer-events: none;
      z-index: 2;
      font-size: 0px;
      animation: heartExplode var(--dur) ease-out forwards;
    }
    @keyframes heartExplode {
      0%   { font-size: 0px; opacity: 1; transform: translate(0,0) rotate(var(--rot)); }
      30%  { font-size: 34px; opacity: 1; }
      100% { font-size: 22px; opacity: 0; transform: translate(var(--hx), var(--hy)) rotate(var(--rot)); }
    }

  </style>
</head>
<body>
  <div class="app-root">
    <section class="start-screen" id="startScreen">
      <div id="butterflyContainer" style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:3;"></div>
      <div class="start-overlay">
        <div class="start-highlight">1 класс • пазл</div>
        <h1 class="start-title">Комплексный урок<br>3 четверть</h1>
        <p class="start-subtitle">
        </p>
        <button class="start-button" id="startButton">Играть</button>
        <div class="start-footer">
          мобильные устройства, ПК и планшеты
        </div>
      </div>
    </section>
    <section class="game-screen" id="gameScreen">
      <div class="game-wrapper">
        <div class="top-bar">
          <div class="progress">
            <div class="progress-check">✓</div>
            <div class="progress-text" id="progressText">0 / 12</div>
          </div>
          <button class="sound-toggle" id="soundToggle" aria-label="Переключить звук">
            <span class="sound-icon" id="soundIcon">🔊</span>
          </button>
        </div>
        <div class="game-field">
          <div class="image-area">
            <div class="puzzle-image-wrapper">
              <div class="tiles-grid" id="tilesGrid"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <div class="overlay" id="errorOverlay">
      <div class="overlay-card">
        <div class="overlay-title" id="errorTitle">No!</div>
        <div class="overlay-text" id="errorText">
          Wrong. Try again?
        </div>
        <button class="overlay-button" id="tryAgainButton">try again</button>
      </div>
    </div>
    <div class="final-overlay" id="finalOverlay">
      <div class="final-content">
        <div class="final-title">Молодец!</div>
        <div class="final-subtitle">
          Все задания выполнены! 🌸
        </div>
        <button class="final-button" id="playAgainButton">Играть снова</button>
      </div>
    </div>
    <div class="zoom-overlay" id="zoomOverlay">
      <div class="zoom-card" id="zoomCard">
        <div class="zoom-header">
          <div class="zoom-title" id="zoomTitle">Задание</div>
          <button class="zoom-close" id="zoomClose">✕</button>
        </div>
        <div class="zoom-question" id="zoomQuestion"></div>
        <div id="zoomBody"></div>
        <button class="zoom-button" id="zoomSubmit">Проверить ✓</button>
      </div>
    </div>
  </div>
  <script>
    /*
      tile types:
        "text"   – single text input  (question + answer string)
        "examples" – 6 math expressions each with own answer  (examples:[{label,answer}])
        "signs"  – 6 comparisons each needing <, > or =  (comparisons:[{left,right,answer}])
    */
    const puzzles = [
      {
        type: "text",
        question: "Запиши числа в порядке увеличения:\n16, 10, 6, 14, 20, 2",
        answer: "2, 6, 10, 14, 16, 20",
        placeholder: "перечисли через запятую"
      },
      {
        type: "text",
        question: "Ребята нашли в лесу 5 опят и 7 груздей.\nНа сколько больше груздей, чем опят?",
        answer: "2",
        placeholder: "Ответ..."
      },
      {
        type: "examples",
        question: "Реши примеры:",
        examples: [
          { label:"9 – 7 =",      answer:"2"  },
          { label:"6 – 4 + 7 =",  answer:"9"  },
          { label:"8 – 5 + 2 =",  answer:"5"  },
          { label:"3 + 7 =",      answer:"10" },
          { label:"2 + 8 – 5 =",  answer:"5"  },
          { label:"6 + 3 – 7 =",  answer:"2"  },
        ]
      },
      {
        type: "signs",
        question: "Впиши нужные знаки <, > или =",
        comparisons: [
          { left:"9 – 5",  right:"4",     answer:"=" },
          { left:"6 + 2",  right:"6",     answer:">" },
          { left:"10 – 7", right:"4",     answer:"<" },
          { left:"9",      right:"3 + 7", answer:"<" },
          { left:"0",      right:"6 – 6", answer:"=" },
          { left:"10",     right:"9 – 5", answer:">" },
        ]
      },
      {
        type: "text",
        question: "Длина первого отрезка 7 см,\nа длина второго — на 2 см короче.\nНайди длину второго отрезка.",
        answer: "5 см",
        placeholder: "Ответ в см..."
      },
      {
        type: "text",
        question: "Запиши числа в порядке уменьшения:\n11, 9, 6, 13, 18, 3",
        answer: "18, 13, 11, 9, 6, 3",
        placeholder: "перечисли через запятую"
      },
      {
        type: "text",
        question: "На дереве сидело 8 синиц и 5 воробьёв.\nНа сколько меньше воробьёв, чем синиц?",
        answer: "3",
        placeholder: "Ответ..."
      },
      {
        type: "examples",
        question: "Реши примеры:",
        examples: [
          { label:"9 – 5 =",      answer:"4"  },
          { label:"9 – 4 + 5 =",  answer:"10" },
          { label:"6 – 5 + 9 =",  answer:"10" },
          { label:"3 + 6 =",      answer:"9"  },
          { label:"8 + 0 – 5 =",  answer:"3"  },
          { label:"6 – 3 + 7 =",  answer:"10" },
        ]
      },
      {
        type: "signs",
        question: "Впиши нужные знаки <, > или =",
        comparisons: [
          { left:"8 – 5",  right:"4",     answer:"<" },
          { left:"7 + 2",  right:"6",     answer:">" },
          { left:"10 – 8", right:"4",     answer:"<" },
          { left:"6",      right:"3 + 7", answer:"<" },
          { left:"0",      right:"7 – 7", answer:"=" },
          { left:"10",     right:"7 – 5", answer:">" },
        ]
      },
      {
        type: "text",
        question: "Длина первого отрезка 4 см,\nа длина второго — на 3 см длиннее.\nНайди длину второго отрезка.",
        answer: "7 см",
        placeholder: "Ответ в см..."
      },
      {
        type: "text",
        question: "Коля поймал 4 окуня и столько же ершей.\nСколько всего рыб поймал Коля?",
        answer: "8",
        placeholder: "Ответ..."
      },
      {
        type: "text",
        question: "В маленькой пирамидке 8 кружков,\nа в большой — на 2 кружка больше.\nСколько кружков в большой пирамидке?",
        answer: "10",
        placeholder: "Ответ..."
      },
    ];
    const TOTAL_TILES = puzzles.length;
    const startScreen = document.getElementById("startScreen");
    const gameScreen  = document.getElementById("gameScreen");
    const startButton = document.getElementById("startButton");
    const tilesGrid      = document.getElementById("tilesGrid");
    const progressTextEl = document.getElementById("progressText");
    const errorOverlay   = document.getElementById("errorOverlay");
    const errorTitleEl   = document.getElementById("errorTitle");
    const errorTextEl    = document.getElementById("errorText");
    const tryAgainButton = document.getElementById("tryAgainButton");
    const finalOverlay   = document.getElementById("finalOverlay");
    const playAgainButton= document.getElementById("playAgainButton");
    const soundToggleBtn = document.getElementById("soundToggle");
    const soundIconEl    = document.getElementById("soundIcon");
    let soundEnabled = true;
    const flipSound  = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    const errorSound = new Audio("https://actions.google.com/sounds/v1/cartoon/goofy_spring_bounces.ogg");
    const winSound   = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    flipSound.volume  = 0.25;
    errorSound.volume = 0.4;
    winSound.volume   = 0.25;
    function playSound(audio) {
      if (!soundEnabled || !audio) return;
      try {
        audio.currentTime = 0;
        audio.play();
      } catch (e) {}
    }
    function playErrorSoundLimited() {
      if (!soundEnabled) return;
      try {
        errorSound.currentTime = 0;
        errorSound.play();
        setTimeout(() => {
          try {
            errorSound.pause();
            errorSound.currentTime = 0;
          } catch (e) {}
        }, 2000);
      } catch (e) {}
    }
    let openedTiles   = 0;
    let wrongAttempts = 0;
    let lastErrorTile = null;
    function updateProgress() {
      progressTextEl.textContent = `${openedTiles} / ${TOTAL_TILES}`;
    }
    const puzzleEdges = [
      { top:"none", bottom:"tab",   left:"none",  right:"tab"   },
      { top:"none", bottom:"blank", left:"blank", right:"tab"   },
      { top:"none", bottom:"tab",   left:"blank", right:"tab"   },
      { top:"none", bottom:"blank", left:"blank", right:"none"  },
      { top:"blank",bottom:"tab",   left:"none",  right:"tab"   },
      { top:"tab",  bottom:"blank", left:"blank", right:"tab"   },
      { top:"blank",bottom:"tab",   left:"blank", right:"tab"   },
      { top:"tab",  bottom:"blank", left:"blank", right:"none"  },
      { top:"blank",bottom:"none",  left:"none",  right:"tab"   },
      { top:"tab",  bottom:"none",  left:"blank", right:"tab"   },
      { top:"blank",bottom:"none",  left:"blank", right:"tab"   },
      { top:"tab",  bottom:"none",  left:"blank", right:"none"  }
    ];
    let zoomActive = false;
    let zoomTileIndex = null;
    // References for zoom overlay inputs (rebuilt each open)
    let zoomInputRef = null;
    let zoomExampleInputsRef = [];
    let zoomSignsRef = [];

    const zoomOverlay  = document.getElementById("zoomOverlay");
    const zoomTitleEl  = document.getElementById("zoomTitle");
    const zoomQuestionEl = document.getElementById("zoomQuestion");
    const zoomBodyEl   = document.getElementById("zoomBody");
    const zoomCloseBtn = document.getElementById("zoomClose");
    const zoomSubmitBtn= document.getElementById("zoomSubmit");

    function openZoom(index) {
      zoomTileIndex = index;
      zoomActive = true;
      const puzzle = puzzles[index];
      zoomTitleEl.textContent = `Задание ${index + 1}`;
      zoomQuestionEl.textContent = puzzle.question || "";
      zoomBodyEl.innerHTML = "";
      zoomInputRef = null;
      zoomExampleInputsRef = [];
      zoomSignsRef = new Array(puzzle.comparisons ? puzzle.comparisons.length : 0).fill(null);

      if (puzzle.type === "text") {
        const inp = document.createElement("input");
        inp.type = "text";
        inp.className = "zoom-input";
        inp.placeholder = puzzle.placeholder || "Ответ...";
        inp.autocomplete = "off";
        zoomBodyEl.appendChild(inp);
        zoomInputRef = inp;
        setTimeout(() => inp.focus(), 60);
        inp.addEventListener("keydown", e => { if(e.key==="Enter"){ e.preventDefault(); zoomSubmitBtn.click(); }});

      } else if (puzzle.type === "examples") {
        const grid = document.createElement("div");
        grid.className = "zoom-examples-grid";
        puzzle.examples.forEach((ex, ei) => {
          const row = document.createElement("div");
          row.className = "zoom-example-row";
          const lbl = document.createElement("span");
          lbl.textContent = ex.label;
          const inp = document.createElement("input");
          inp.type = "text"; inp.className = "zoom-example-input";
          inp.maxLength = 4; inp.autocomplete = "off";
          inp.setAttribute("inputmode","numeric");
          zoomExampleInputsRef.push({ inp, answer: ex.answer });
          row.append(lbl, inp);
          grid.appendChild(row);
          inp.addEventListener("keydown", e => { if(e.key==="Enter"){ e.preventDefault(); zoomSubmitBtn.click(); }});
        });
        zoomBodyEl.appendChild(grid);
        setTimeout(() => zoomExampleInputsRef[0]?.inp.focus(), 60);

      } else if (puzzle.type === "signs") {
        const cgrid = document.createElement("div");
        cgrid.className = "zoom-comparisons-grid";
        puzzle.comparisons.forEach((cmp, ci) => {
          const row = document.createElement("div");
          row.className = "zoom-comparison-row";
          const exL = document.createElement("span");
          exL.textContent = cmp.left;
          exL.style.minWidth = "52px";
          const signs = ["<",">","="];
          const btnGroup = [];
          signs.forEach(s => {
            const sb = document.createElement("button");
            sb.className = "zoom-sign-btn";
            sb.type = "button";
            sb.textContent = s;
            sb.addEventListener("click", () => {
              btnGroup.forEach(b => b.classList.remove("selected"));
              sb.classList.add("selected");
              zoomSignsRef[ci] = s;
            });
            btnGroup.push(sb);
            row.appendChild(sb);
          });
          const exR = document.createElement("span");
          exR.textContent = cmp.right;
          exR.style.minWidth = "36px";
          row.prepend(exL);
          row.append(exR);
          cgrid.appendChild(row);
        });
        zoomBodyEl.appendChild(cgrid);
      }
      zoomOverlay.classList.add("visible");
    }

    function closeZoom() {
      zoomActive = false;
      zoomTileIndex = null;
      zoomOverlay.classList.remove("visible");
    }

    zoomCloseBtn.addEventListener("click", closeZoom);
    zoomOverlay.addEventListener("click", e => { if(e.target === zoomOverlay) closeZoom(); });

    zoomSubmitBtn.addEventListener("click", () => {
      if (zoomTileIndex === null) return;
      const puzzle = puzzles[zoomTileIndex];
      const tile = tilesGrid.querySelector(`.puzzle-tile[data-index="${zoomTileIndex}"]`);
      if (!tile) return;
      spawnSparks(zoomSubmitBtn);

      if (puzzle.type === "text") {
        const val = zoomInputRef ? zoomInputRef.value : "";
        if (!val.trim()) return;
        if (checkAnswer(zoomTileIndex, val)) { closeZoom(); markCorrect(tile, zoomTileIndex); }
        else markWrong(tile, zoomTileIndex);

      } else if (puzzle.type === "examples") {
        let allOk = true;
        zoomExampleInputsRef.forEach(({inp, answer}) => {
          if (normalizeAnswer(inp.value) === normalizeAnswer(answer)) {
            inp.classList.add("correct");
          } else { allOk = false; }
        });
        if (allOk) { closeZoom(); markCorrect(tile, zoomTileIndex); }
        else markWrong(tile, zoomTileIndex);

      } else if (puzzle.type === "signs") {
        const allOk = puzzle.comparisons.every((cmp, ci) => zoomSignsRef[ci] === cmp.answer);
        if (allOk) { closeZoom(); markCorrect(tile, zoomTileIndex); }
        else markWrong(tile, zoomTileIndex);
      }
    });

    function createTiles() {
      tilesGrid.innerHTML = "";
      puzzles.forEach((puzzle, index) => {
        const edges = puzzleEdges[index] || {top:"none",bottom:"none",left:"none",right:"none"};
        const tile = document.createElement("div");
        tile.className = "puzzle-tile";
        tile.dataset.index  = String(index);
        tile.dataset.top    = edges.top;
        tile.dataset.bottom = edges.bottom;
        tile.dataset.left   = edges.left;
        tile.dataset.right  = edges.right;
        const inner = document.createElement("div");
        inner.className = "puzzle-tile-inner";

        // Header row
        const topRow = document.createElement("div");
        topRow.className = "tile-top-row";
        const header = document.createElement("div");
        header.className = "tile-header";
        header.textContent = `Задание ${index + 1}`;
        const zoomBtn = document.createElement("button");
        zoomBtn.className = "tile-zoom-btn";
        zoomBtn.type = "button";
        zoomBtn.title = "Увеличить";
        zoomBtn.textContent = "⛶";
        zoomBtn.addEventListener("click", e => { e.stopPropagation(); openZoom(index); });
        topRow.appendChild(header);
        topRow.appendChild(zoomBtn);
        inner.appendChild(topRow);

        // Question
        const q = document.createElement("div");
        q.className = "tile-question";
        q.style.whiteSpace = "pre-wrap";
        q.style.fontSize = "13px";
        q.style.lineHeight = "1.35";
        q.style.marginBottom = "4px";
        q.style.flex = "0 0 auto";
        q.textContent = puzzle.question;
        inner.appendChild(q);

        // ── TYPE: text ──────────────────────────────────────────
        if (puzzle.type === "text") {
          const input = document.createElement("input");
          input.type = "text";
          input.className = "tile-input";
          input.placeholder = puzzle.placeholder || "Ответ...";
          input.autocomplete = "off";
          const btn = document.createElement("button");
          btn.className = "tile-button";
          btn.textContent = "✓";
          inner.appendChild(input);
          inner.appendChild(btn);
          tile.appendChild(inner);
          tilesGrid.appendChild(tile);

          function checkText(fromZoom = null) {
            const val = fromZoom !== null ? fromZoom : input.value;
            if (!val.trim()) return;
            if (checkAnswer(index, val)) {
              markCorrect(tile, index);
            } else {
              markWrong(tile, index);
            }
          }
          btn.addEventListener("click", () => { spawnSparks(btn); checkText(); });
          input.addEventListener("keydown", e => { if(e.key==="Enter"){ e.preventDefault(); checkText(); }});

        // ── TYPE: examples ──────────────────────────────────────
        } else if (puzzle.type === "examples") {
          q.style.fontSize = "12px";
          const grid = document.createElement("div");
          grid.className = "examples-grid";
          const inputs = [];
          puzzle.examples.forEach((ex, ei) => {
            const row = document.createElement("div");
            row.className = "example-row";
            const lbl = document.createElement("span");
            lbl.className = "example-label";
            lbl.textContent = ex.label;
            const inp = document.createElement("input");
            inp.type = "text"; inp.className = "example-input";
            inp.maxLength = 4; inp.autocomplete = "off";
            inp.setAttribute("inputmode","numeric");
            inputs.push(inp);
            row.append(lbl, inp);
            grid.appendChild(row);
          });
          const btn = document.createElement("button");
          btn.className = "tile-button";
          btn.style.marginTop = "4px";
          btn.textContent = "✓";
          inner.appendChild(grid);
          inner.appendChild(btn);
          tile.appendChild(inner);
          tilesGrid.appendChild(tile);

          function checkExamples() {
            let allCorrect = true;
            let anyWrong = false;
            puzzle.examples.forEach((ex, ei) => {
              const val = inputs[ei].value.trim();
              if (normalizeAnswer(val) === normalizeAnswer(ex.answer)) {
                inputs[ei].classList.add("correct");
              } else {
                allCorrect = false;
                anyWrong = true;
              }
            });
            if (allCorrect) {
              markCorrect(tile, index);
            } else {
              markWrong(tile, index);
            }
          }
          btn.addEventListener("click", () => { spawnSparks(btn); checkExamples(); });
          inputs.forEach(inp => inp.addEventListener("keydown", e => {
            if(e.key==="Enter"){ e.preventDefault(); checkExamples(); }
          }));

        // ── TYPE: signs ─────────────────────────────────────────
        } else if (puzzle.type === "signs") {
          q.style.fontSize = "11px";
          q.style.marginBottom = "2px";
          const cgrid = document.createElement("div");
          cgrid.className = "comparisons-grid";
          const selectedSigns = new Array(puzzle.comparisons.length).fill(null);

          puzzle.comparisons.forEach((cmp, ci) => {
            const row = document.createElement("div");
            row.className = "comparison-row";
            const expr = document.createElement("span");
            expr.className = "comparison-expr";
            expr.textContent = cmp.left + "  ";
            const signs = ["<",">","="];
            const btnGroup = [];
            signs.forEach(s => {
              const sb = document.createElement("button");
              sb.className = "sign-btn";
              sb.type = "button";
              sb.textContent = s;
              sb.addEventListener("click", () => {
                btnGroup.forEach(b => b.classList.remove("selected"));
                sb.classList.add("selected");
                selectedSigns[ci] = s;
              });
              btnGroup.push(sb);
              row.appendChild(sb);
            });
            const expr2 = document.createElement("span");
            expr2.className = "comparison-expr";
            expr2.style.marginLeft = "2px";
            expr2.textContent = "  " + cmp.right;
            row.prepend(expr);
            row.append(expr2);
            cgrid.appendChild(row);
          });

          const btn = document.createElement("button");
          btn.className = "tile-button";
          btn.style.marginTop = "4px";
          btn.textContent = "✓";

          inner.appendChild(cgrid);
          inner.appendChild(btn);
          tile.appendChild(inner);
          tilesGrid.appendChild(tile);

          function checkSigns() {
            let allCorrect = true;
            puzzle.comparisons.forEach((cmp, ci) => {
              if (selectedSigns[ci] !== cmp.answer) allCorrect = false;
              else {
                // mark correct sign buttons green
                const rows = cgrid.querySelectorAll(".comparison-row");
                const btns = rows[ci].querySelectorAll(".sign-btn");
                btns.forEach(b => { if(b.textContent===cmp.answer) b.classList.add("correct"); });
              }
            });
            if (allCorrect) {
              markCorrect(tile, index);
            } else {
              markWrong(tile, index);
            }
          }
          btn.addEventListener("click", () => { spawnSparks(btn); checkSigns(); });
        }
      });
    }

    /* shared correct / wrong handlers */
    function markCorrect(tile, index) {
      tile.classList.add("flipping");
      spawnFlowerBloom(tile);
      playSound(flipSound);
      setTimeout(() => {
        tile.classList.add("disabled");
        tile.style.pointerEvents = "none";
      }, 380);
      openedTiles++;
      updateProgress();
      if (openedTiles >= TOTAL_TILES) setTimeout(showFinalScreen, 600);
      if (zoomActive && zoomTileIndex === index) closeZoom();
    }
    function markWrong(tile, index) {
      wrongAttempts++;
      tile.classList.remove("wiggle");
      void tile.offsetWidth;
      tile.classList.add("wiggle");
      lastErrorTile = tile;
      playErrorSoundLimited();
      if (wrongAttempts >= 3) showGameOver();
      else showErrorOverlay();
    }

    function normalizeAnswer(v) {
      return v.trim().toLowerCase()
        .replace(/\s*,\s*/g, ",")   // spaces around commas
        .replace(/\s+см$/,"см")     // "5 см" → "5см"
        .replace(/см$/,"см");       // ensure consistent
    }
    function checkAnswer(index, value) {
      const puzzle = puzzles[index];
      if (!puzzle.answer) return false;
      const norm = s => s.toString().trim().toLowerCase()
        .replace(/\s*,\s*/g,",")
        .replace(/\s+см$/,"см");
      // also accept bare number if answer ends in "см"
      const correct = norm(puzzle.answer);
      const given   = norm(value);
      if (given === correct) return true;
      // accept "5" when answer is "5 см"
      if (correct.endsWith("см") && given === correct.replace("см","").trim()) return true;
      return false;
    }
    function showErrorOverlay() {
      errorTitleEl.textContent = "Ошибка!";
      errorTextEl.textContent  = "Попробуй ещё раз?";
      tryAgainButton.textContent = "Ещё раз";
      errorOverlay.classList.add("visible");
    }
    function hideErrorOverlay() {
      errorOverlay.classList.remove("visible");
    }
    function showGameOver() {
      errorTitleEl.textContent = "3 ошибки!";
      errorTextEl.textContent  = "Начнём сначала?";
      tryAgainButton.textContent = "Начать заново";
      errorOverlay.classList.add("visible");
    }
    function restartGameFromOverlay() {
      errorOverlay.classList.remove("visible");
      restartGame();
    }
    function showFinalScreen() {
      finalOverlay.classList.add("visible");
      spawnRainbow();
      spawnHearts();
      setTimeout(spawnHearts, 1800);
      playSound(winSound);
    }
    function hideFinalScreen() {
      finalOverlay.classList.remove("visible");
    }
    function restartGame() {
      hideFinalScreen();
      openedTiles   = 0;
      wrongAttempts = 0;
      lastErrorTile = null;
      updateProgress();
      createTiles();
    }
    function spawnFireworks() {
      /* kept for compat - now we do hearts + rainbow */
    }

    /* ===== SVG BUTTERFLIES ===== */
    const butterflyContainer = document.getElementById("butterflyContainer");

    /* Wing shape themes: [upperWing fill, lowerWing fill, bodyColor, petalColor] */
    const BF_THEMES = [
      { upper:"#f9b8d8", lower:"#f080b8", body:"#7a1a40", spots:"rgba(255,255,255,0.35)", petal:"#ffadd6" },
      { upper:"#d8b4fe", lower:"#a855f7", body:"#4a1270", spots:"rgba(255,255,255,0.3)",  petal:"#e0c0ff" },
      { upper:"#fde68a", lower:"#f59e0b", body:"#7a3a00", spots:"rgba(255,255,255,0.35)", petal:"#ffe4a0" },
      { upper:"#a5f3fc", lower:"#22d3ee", body:"#0e4a5a", spots:"rgba(255,255,255,0.35)", petal:"#c0f0ff" },
      { upper:"#fca5a5", lower:"#ef4444", body:"#7a1010", spots:"rgba(255,255,255,0.3)",  petal:"#ffcccc" },
    ];

    /* Build one SVG butterfly */
    function makeSVGButterfly(theme, scale) {
      const ns = "http://www.w3.org/2000/svg";
      const flapDur = (0.28 + Math.random() * 0.18).toFixed(2) + "s";

      /* Outer wrapper — JS will move this via style.transform */
      const wrap = document.createElement("div");
      wrap.className = "butterfly-wrap";
      wrap.style.setProperty("--flap", flapDur);

      const svg = document.createElementNS(ns, "svg");
      svg.setAttribute("width",  String(Math.round(120 * scale)));
      svg.setAttribute("height", String(Math.round(80  * scale)));
      svg.setAttribute("viewBox", "0 0 120 80");

      /* 
         SVG viewBox 0 0 120 80
         Body centre-line at x=60
         Left wings: x < 60,  Right wings: x > 60
         Each group animates with transform-box:fill-box so origin is the bounding box
      */

      /* defs: gradients */
      const defs = document.createElementNS(ns, "defs");

      function makeGrad(id, c1, c2, cx, cy) {
        const g = document.createElementNS(ns, "radialGradient");
        g.setAttribute("id", id);
        g.setAttribute("cx", cx); g.setAttribute("cy", cy);
        g.setAttribute("r", "55%");
        g.setAttribute("gradientUnits","objectBoundingBox");
        const s1 = document.createElementNS(ns, "stop");
        s1.setAttribute("offset","0%");   s1.setAttribute("stop-color", c1);
        const s2 = document.createElementNS(ns, "stop");
        s2.setAttribute("offset","100%"); s2.setAttribute("stop-color", c2);
        g.append(s1, s2);
        return g;
      }
      const uid = Math.random().toString(36).slice(2,7);
      defs.append(
        makeGrad("bfu"+uid, "#fff", theme.upper, "30%","25%"),
        makeGrad("bfl"+uid, theme.upper, theme.lower, "60%","70%")
      );
      svg.appendChild(defs);

      function el(tag, attrs) {
        const e = document.createElementNS(ns, tag);
        for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
        return e;
      }

      /* ── LEFT wings (x: 0..60) ── */
      const gL = document.createElementNS(ns, "g");
      gL.setAttribute("class", "bf-wing-l");
      // upper left wing: bezier blob
      gL.append(
        el("path", { d:"M60,32 C55,10 30,5 12,18 C0,28 5,48 18,50 C35,52 58,44 60,32 Z",
                     fill:`url(#bfu${uid})`, opacity:"0.93" }),
        // lower left wing
        el("path", { d:"M60,40 C55,52 35,68 18,64 C8,61 8,50 18,46 C32,42 56,46 60,40 Z",
                     fill:`url(#bfl${uid})`, opacity:"0.88" }),
        // shimmer
        el("ellipse", { cx:"26", cy:"22", rx:"9", ry:"7", fill:theme.spots }),
        // vein
        el("line", { x1:"60",y1:"36", x2:"20",y2:"16", stroke:"rgba(255,255,255,0.3)", "stroke-width":"0.9" })
      );

      /* ── RIGHT wings (x: 60..120) ── */
      const gR = document.createElementNS(ns, "g");
      gR.setAttribute("class", "bf-wing-r");
      gR.append(
        el("path", { d:"M60,32 C65,10 90,5 108,18 C120,28 115,48 102,50 C85,52 62,44 60,32 Z",
                     fill:`url(#bfu${uid})`, opacity:"0.93" }),
        el("path", { d:"M60,40 C65,52 85,68 102,64 C112,61 112,50 102,46 C88,42 64,46 60,40 Z",
                     fill:`url(#bfl${uid})`, opacity:"0.88" }),
        el("ellipse", { cx:"94", cy:"22", rx:"9", ry:"7", fill:theme.spots }),
        el("line", { x1:"60",y1:"36", x2:"100",y2:"16", stroke:"rgba(255,255,255,0.3)", "stroke-width":"0.9" })
      );

      /* Body & head */
      const body = el("ellipse", { cx:"60",cy:"44", rx:"3.5",ry:"22", fill:theme.body });
      const head = el("circle",  { cx:"60",cy:"21", r:"5",           fill:theme.body });

      /* Antennae */
      const ant1 = el("path", { d:"M60,19 Q52,8 45,4", stroke:theme.body, "stroke-width":"1.3", fill:"none" });
      const dot1 = el("circle",{ cx:"45",cy:"4", r:"2.5", fill:theme.upper });
      const ant2 = el("path", { d:"M60,19 Q68,8 75,4", stroke:theme.body, "stroke-width":"1.3", fill:"none" });
      const dot2 = el("circle",{ cx:"75",cy:"4", r:"2.5", fill:theme.upper });

      svg.append(gL, gR, body, head, ant1, dot1, ant2, dot2);
      wrap.appendChild(svg);

      /* Petal trail divs */
      const petalColors = [theme.petal, theme.upper, "#fff0f8"];
      for (let i = 0; i < 3; i++) {
        const p = document.createElement("div");
        p.className = "bf-petal";
        p.style.background = petalColors[i % petalColors.length];
        const ang = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 20;
        p.style.setProperty("--px", (Math.cos(ang)*dist).toFixed(1)+"px");
        p.style.setProperty("--py", (Math.sin(ang)*dist+12).toFixed(1)+"px");
        p.style.setProperty("--pd", (1.0+Math.random()*0.8).toFixed(2)+"s");
        p.style.setProperty("--pdelay", (Math.random()*1.5).toFixed(2)+"s");
        p.style.left = (20 + Math.random()*60) + "%";
        p.style.top  = (20 + Math.random()*60) + "%";
        wrap.appendChild(p);
      }

      return wrap;
    }

    /* Animate one butterfly across the screen via rAF (sinusoidal path) */
    function launchButterfly() {
      const theme = BF_THEMES[Math.floor(Math.random() * BF_THEMES.length)];
      const scale = 0.55 + Math.random() * 0.35;            // size variety
      const wrap  = makeSVGButterfly(theme, scale);

      const startY   = 8  + Math.random() * 70;             // % of screen height
      const totalPx  = window.innerWidth + 200;
      const speed    = 55 + Math.random() * 45;             // px/s
      const duration = (totalPx / speed) * 1000;
      const ampY     = 25 + Math.random() * 35;             // wave amplitude
      const freq     = 0.6 + Math.random() * 0.8;           // wave frequency

      wrap.style.left = "-110px";
      wrap.style.top  = startY + "vh";
      butterflyContainer.appendChild(wrap);

      let start = null;
      function step(ts) {
        if (!start) start = ts;
        const elapsed = ts - start;
        const progress = elapsed / duration;                 // 0 → 1
        if (progress >= 1) {
          if (wrap.parentNode) wrap.parentNode.removeChild(wrap);
          return;
        }
        const x = -110 + progress * totalPx;
        const y = Math.sin(progress * Math.PI * 2 * freq) * ampY;
        // subtle tilt with direction
        const tilt = Math.cos(progress * Math.PI * 2 * freq) * 8;
        wrap.style.transform = `translate(${x}px, ${y}px) rotate(${tilt}deg)`;
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function startButterflies() {
      // stagger first batch
      for (let i = 0; i < 4; i++) {
        setTimeout(launchButterfly, i * 1800);
      }
      setInterval(launchButterfly, 4000);
    }

    /* ===== GLITTER removed ===== */
    function startGlitter() { /* no-op */ }

    /* ===== FLOWER BLOOM ON CORRECT ANSWER ===== */
    const FLOWERS = ["🌸","🌺","🌷","🌼","🌻","💐"];
    function spawnFlowerBloom(tileEl) {
      const rect = tileEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      for (let i = 0; i < 4; i++) {
        const f = document.createElement("span");
        f.className = "flower-bloom";
        f.textContent = FLOWERS[Math.floor(Math.random() * FLOWERS.length)];
        f.style.left = (cx + (Math.random() - 0.5) * 60) + "px";
        f.style.top  = (cy + (Math.random() - 0.5) * 40) + "px";
        f.style.animationDelay = (i * 0.12) + "s";
        document.body.appendChild(f);
        setTimeout(() => { if(f.parentNode) f.parentNode.removeChild(f); }, 1300);
      }
    }

    /* ===== SPARKS FROM SEND BUTTON ===== */
    const SPARK_COLORS = ["#ff80aa","#ffb3cc","#ff4488","#ffddee","#ff6699","#ffe0ec"];
    function spawnSparks(btnEl) {
      const rect = btnEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top  + rect.height / 2;
      for (let i = 0; i < 12; i++) {
        const s = document.createElement("div");
        s.className = "spark";
        const angle = (i / 12) * Math.PI * 2 + (Math.random() - 0.5) * 0.8;
        const dist  = 40 + Math.random() * 50;
        s.style.left = cx + "px";
        s.style.top  = cy + "px";
        s.style.background = SPARK_COLORS[Math.floor(Math.random() * SPARK_COLORS.length)];
        s.style.setProperty("--sx", Math.cos(angle) * dist + "px");
        s.style.setProperty("--sy", Math.sin(angle) * dist + "px");
        s.style.animationDuration = (0.4 + Math.random() * 0.4) + "s";
        s.style.animationDelay    = (Math.random() * 0.1) + "s";
        document.body.appendChild(s);
        setTimeout(() => { if(s.parentNode) s.parentNode.removeChild(s); }, 900);
      }
    }

    /* ===== WIN: RAINBOW + HEART FIREWORKS ===== */
    function spawnRainbow() {
      const fo = document.getElementById("finalOverlay");
      for (let i = 0; i < 6; i++) {
        const arc = document.createElement("div");
        arc.className = "rainbow-arc";
        fo.appendChild(arc);
        setTimeout(() => { if(arc.parentNode) arc.parentNode.removeChild(arc); }, 3000);
      }
    }

    function spawnHearts() {
      const fo = document.getElementById("finalOverlay");
      const HEARTS = ["💕","💖","💗","💓","💝","❤️","🌸"];
      for (let wave = 0; wave < 3; wave++) {
        setTimeout(() => {
          for (let i = 0; i < 14; i++) {
            const h = document.createElement("span");
            h.className = "heart-fw";
            const angle = (i / 14) * Math.PI * 2;
            const dist  = 80 + Math.random() * 140;
            const dur   = (700 + Math.random() * 600) + "ms";
            h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
            h.style.left  = (20 + Math.random() * 60) + "%";
            h.style.top   = (20 + Math.random() * 50) + "%";
            h.style.setProperty("--hx", Math.cos(angle) * dist + "px");
            h.style.setProperty("--hy", Math.sin(angle) * dist + "px");
            h.style.setProperty("--rot", (Math.random() * 40 - 20) + "deg");
            h.style.setProperty("--dur", dur);
            fo.appendChild(h);
            setTimeout(() => { if(h.parentNode) fo.removeChild(h); }, 1500);
          }
        }, wave * 500);
      }
    }

    startButterflies();
    startGlitter();

    startButton.addEventListener("click", () => {
      startScreen.style.display = "none";
      gameScreen.style.display  = "flex";
      openedTiles   = 0;
      wrongAttempts = 0;
      updateProgress();
      createTiles();
    });
    tryAgainButton.addEventListener("click", () => {
      if (wrongAttempts >= 3) {
        restartGameFromOverlay();
      } else {
        hideErrorOverlay();
      }
    });
    errorOverlay.addEventListener("click", e => {
      if (e.target === errorOverlay) {
        if (wrongAttempts >= 3) {
          restartGameFromOverlay();
        } else {
          hideErrorOverlay();
        }
      }
    });
    playAgainButton.addEventListener("click", restartGame);
    soundToggleBtn.addEventListener("click", () => {
      soundEnabled = !soundEnabled;
      soundIconEl.textContent = soundEnabled ? "🔊" : "🔈";
    });
    (function() {
      const mark = "cmFkaWF0ZWFjaGVy"; 
      const check = mark.split('').reduce((a,b)=>a+b.charCodeAt(0),0);
    })();
  </script>
